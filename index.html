<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Paweł Dziuba, Jakub Rajca, Mikołaj Bębenek" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>60-tka 🚨</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="src/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="src/js/main.js" defer></script>
  </head>

  <body>
    <header>
      <div class="row">
        <div class="col-md-3">
          <img src="assets/1024x1024_logo.png" width="200" height="200" />
        </div>
        <div class="col-md-6">
          <h1>60-tka 🚨 - twoje lokalne zdarzenia!</h1>
        </div>
      </div>
    </header>
    <main>
      <h2>Dodaj nowe zdarzenie:</h2>
      <nav>
        <input
          type="file"
          id="photoCapture"
          accept="image/*"
          capture="environment"
        />
        <button onclick="shareData()">Udostępnij zdarzenie</button>
      </nav>

      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <div id="map" style="height: 300px"></div>
          </div>

          <div
            class="col-md-6 d-flex align-items-center justify-content-center"
          >
            <img
              id="photoPreview"
              src=""
              alt="Podgląd zdjęcia"
              style="max-width: 100%; display: none; border-radius: 10px"
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
