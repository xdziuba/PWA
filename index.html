<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Paweł Dziuba, Jakub Rajca, Mikołaj Bębenek" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>60-tka 🚨</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="src/css/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="src/js/main.js" defer></script>
  </head>

  <body>
    <header>
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-auto">
            <img src="assets/1024x1024_logo.png" alt="Logo 60-tka" />
          </div>
          <div class="col">
            <h1>60-tka 🚨</h1>
            <p class="subtitle">Twoje lokalne zdarzenia w jednym miejscu</p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <h2>📋 Dodaj nowe zdarzenie</h2>

      <div class="action-panel">
        <div>
          <label for="photoCapture">📸 Zdjęcie zdarzenia</label>
          <input
            type="file"
            id="photoCapture"
            accept="image/*"
            capture="environment"
          />
        </div>
        <div>
          <label for="eventCategory">🏷️ Kategoria</label>
          <select id="eventCategory">
            <option value="dziura">🕳️ Dziura w drodze</option>
            <option value="wypadek">🚗 Wypadek</option>
            <option value="smieci">🗑️ Śmieci</option>
            <option value="pozar">🔥 Pożar</option>
            <option value="inne">❓ Inne</option>
          </select>
        </div>
        <div class="desc-field">
          <label for="eventDesc">📝 Opis zdarzenia</label>
          <textarea id="eventDesc" placeholder="Krótki opis sytuacji..."></textarea>
        </div>
        <button class="btn-share" onclick="shareData()">📤 Udostępnij zdarzenie</button>
      </div>

      <div class="container-fluid px-0">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="card-panel">
              <h3>🗺️ Mapa zdarzenia</h3>
              <div class="map-wrapper">
                <div id="map"></div>
                <div id="address" class="address-box" style="display:none"></div>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card-panel">
              <h3>🖼️ Podgląd zdjęcia</h3>
              <div class="d-flex align-items-center justify-content-center">
                <img id="photoPreview" src="" alt="Podgląd zdjęcia" />
                <div class="photo-placeholder" id="photoPlaceholder">
                  <span>📷</span>
                  Zdjęcie pojawi się tutaj
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      60-tka &copy; 2026 - Dziuba, Rajca, Bębenek
    </footer>
  </body>
</html>
